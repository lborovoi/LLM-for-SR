name: Reproduce locked results

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  reproduce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install --no-deps -e .
      - name: Validate public data
        run: python -m llm_sr_benchmark validate --data data/locked
      - name: Reproduce tables
        run: python -m llm_sr_benchmark reproduce --data data/locked --output results/reproduced
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Check public release
        run: python scripts/check_public_release.py
